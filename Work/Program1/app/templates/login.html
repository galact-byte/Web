{% extends "base.html" %}
{% block content %}
<div class="panel" style="max-width:520px;">
  <h2>账号登录</h2>
  <div class="grid grid-2">
    <div><label>用户名</label><input id="username" value="admin" /></div>
    <div><label>密码</label><input id="password" type="password" value="admin123" /></div>
  </div>
  <p class="hint">内置测试账号：admin/admin123，tester/tester123，leader/leader123。</p>
  <div class="row">
    <button class="btn-lite" onclick="fillBuiltIn('admin')">填充 admin</button>
    <button class="btn-lite" onclick="fillBuiltIn('tester')">填充 tester</button>
    <button class="btn-lite" onclick="fillBuiltIn('leader')">填充 leader</button>
  </div>
  <br />
  <button onclick="login()">登录</button>
  <button class="btn-lite" onclick="logout()">退出</button>
  <div class="result" id="loginResult">请输入账号密码后登录。</div>
</div>

<div class="panel" data-role-only="admin" id="adminUserPanel">
  <h2>用户管理（管理员）</h2>
  <div class="row">
    <div><label>用户名</label><input id="newUsername" /></div>
    <div><label>密码</label><input id="newPassword" type="password" /></div>
    <div>
      <label>角色</label>
      <select id="newRole">
        <option value="evaluator">evaluator</option>
        <option value="reviewer">reviewer</option>
        <option value="admin">admin</option>
      </select>
    </div>
    <div><label>&nbsp;</label><button class="btn-lite" onclick="createUser()">新增用户</button></div>
  </div>
  <br />
  <button class="btn-lite" onclick="loadUsers()">刷新用户列表</button>
  <table>
    <thead><tr><th>ID</th><th>用户名</th><th>角色</th><th>启用</th><th>操作</th></tr></thead>
    <tbody id="userTable"></tbody>
  </table>
</div>

<script>
let currentRole = 'guest';

function resultText(data, fallback='操作失败') {
  if (!data) return fallback;
  if (typeof data.detail === 'string') return data.detail;
  return data.message || fallback;
}

function authHeaders() {
  const token = localStorage.getItem('auth_token') || '';
  return token ? {'X-Auth-Token': token} : {};
}

function fillBuiltIn(username) {
  const presets = {
    admin: 'admin123',
    tester: 'tester123',
    leader: 'leader123'
  };
  document.getElementById('username').value = username;
  document.getElementById('password').value = presets[username] || '';
}

async function login() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const res = await fetch('/api/auth/login', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({username, password})
  });
  const data = await res.json();
  if (res.ok) {
    localStorage.setItem('auth_token', data.token);
    currentRole = data.user?.role || 'guest';
    if (typeof applyRoleUI === 'function') applyRoleUI(currentRole);
    document.getElementById('loginResult').textContent = `登录成功：${data.user?.username || username}（${currentRole}）`;
    if (currentRole === 'admin') {
      loadUsers();
    } else {
      document.getElementById('userTable').innerHTML = '';
    }
    return;
  }
  document.getElementById('loginResult').textContent = `登录失败：${resultText(data, '用户名或密码错误')}`;
}

async function logout() {
  await fetch('/api/auth/logout', {method: 'POST', headers: authHeaders()});
  localStorage.removeItem('auth_token');
  currentRole = 'guest';
  if (typeof applyRoleUI === 'function') applyRoleUI('guest');
  document.getElementById('userTable').innerHTML = '';
  document.getElementById('loginResult').textContent = '已退出';
}

async function loadUsers() {
  if (currentRole !== 'admin') return;
  const res = await fetch('/api/auth/users', {headers: authHeaders()});
  const data = await res.json();
  if (!res.ok) {
    document.getElementById('loginResult').textContent = `读取用户失败：${resultText(data, '仅管理员可查看用户列表')}`;
    return;
  }
  document.getElementById('loginResult').textContent = `用户列表已刷新，共 ${data.total || 0} 人。`;
  document.getElementById('userTable').innerHTML = data.items.map(u => `
    <tr>
      <td>${u.id}</td>
      <td>${u.username}</td>
      <td>${u.role}</td>
      <td>${u.enabled ? '是' : '否'}</td>
      <td><button class="btn-lite" onclick="toggleUser(${u.id}, ${!u.enabled})">${u.enabled ? '停用' : '启用'}</button></td>
    </tr>
  `).join('');
}

async function createUser() {
  if (currentRole !== 'admin') {
    document.getElementById('loginResult').textContent = '仅管理员可新增用户。';
    return;
  }
  const payload = {
    username: document.getElementById('newUsername').value.trim(),
    password: document.getElementById('newPassword').value,
    role: document.getElementById('newRole').value
  };
  const res = await fetch('/api/auth/users', {
    method: 'POST',
    headers: {'Content-Type': 'application/json', ...authHeaders()},
    body: JSON.stringify(payload)
  });
  const data = await res.json();
  document.getElementById('loginResult').textContent = res.ok ? (data.message || '新增用户成功') : `新增失败：${resultText(data)}`;
  if (res.ok) loadUsers();
}

async function toggleUser(id, enabled) {
  if (currentRole !== 'admin') {
    document.getElementById('loginResult').textContent = '仅管理员可修改用户状态。';
    return;
  }
  const res = await fetch(`/api/auth/users/${id}/toggle?enabled=${enabled}`, {method: 'POST', headers: authHeaders()});
  const data = await res.json();
  document.getElementById('loginResult').textContent = res.ok ? '用户状态已更新。' : `更新失败：${resultText(data)}`;
  if (res.ok) loadUsers();
}

window.addEventListener('app-role-changed', (e) => {
  currentRole = e?.detail?.role || 'guest';
  if (currentRole === 'admin') {
    loadUsers();
  } else {
    document.getElementById('userTable').innerHTML = '';
  }
});
</script>
{% endblock %}
