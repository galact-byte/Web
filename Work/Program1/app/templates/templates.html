{% extends "base.html" %}
{% block content %}
<div class="panel">
  <h2>模板上传</h2>
  <div class="grid grid-3">
    <div><label>模板名称*</label><input id="tplName" /></div>
    <div>
      <label>报告类型*</label>
      <select id="tplType">
        <option value="grading_report">定级报告</option>
        <option value="filing_form">备案表</option>
        <option value="expert_review_form">专家评审表</option>
      </select>
    </div>
    <div><label>分类</label><input id="tplCategory" placeholder="二级/三级模板等" /></div>
    <div><label>地市</label><input id="tplCity" placeholder="如：福州" /></div>
    <div><label>适用级别</label><input id="tplLevel" placeholder="2/3/4" /></div>
    <div><label>描述</label><input id="tplDesc" /></div>
    <div><label>默认模板</label><input id="tplDefault" type="checkbox" /></div>
    <div style="grid-column: span 2;"><label>配置JSON（可选）</label><input id="tplConfig" placeholder='{"title":"模板标题","sections":[...]}' /></div>
    <div><label>模板文件*</label><input id="tplFile" type="file" /></div>
  </div>
  <br />
  <button onclick="uploadTemplate()">上传模板</button>
  <div class="result" id="tplResult">可在此查看操作结果。</div>
</div>

<div class="panel">
  <h2>模板管理</h2>
  <div class="row">
    <div><label>类型</label><input id="qType" /></div>
    <div><label>分类</label><input id="qCategory" /></div>
    <div><label>地市</label><input id="qCity" /></div>
    <div><label>&nbsp;</label><button class="btn-lite" onclick="loadTemplates()">查询</button></div>
  </div>
  <br />
  <table>
    <thead><tr><th>ID</th><th>名称</th><th>类型</th><th>地市</th><th>级别</th><th>版本</th><th>状态</th><th>操作</th></tr></thead>
    <tbody id="tplTable"></tbody>
  </table>
</div>

<script>
function authHeaders() {
  const token = localStorage.getItem('auth_token') || '';
  return token ? {'X-Auth-Token': token} : {};
}

function messageFrom(data, fallback='操作失败') {
  if (!data) return fallback;
  if (typeof data.detail === 'string') return data.detail;
  if (data.detail) return '请求参数不合法';
  return data.message || fallback;
}

function setTplResult(text) {
  document.getElementById('tplResult').textContent = text;
}

async function uploadTemplate() {
  const file = document.getElementById('tplFile').files[0];
  if (!file) {
    alert('请选择模板文件');
    return;
  }
  const fd = new FormData();
  fd.append('template_name', document.getElementById('tplName').value.trim());
  fd.append('report_type', document.getElementById('tplType').value);
  fd.append('category', document.getElementById('tplCategory').value.trim());
  fd.append('city', document.getElementById('tplCity').value.trim());
  fd.append('protection_level', document.getElementById('tplLevel').value.trim());
  fd.append('description', document.getElementById('tplDesc').value.trim());
  fd.append('is_default', document.getElementById('tplDefault').checked ? 'true' : 'false');
  fd.append('config_json', document.getElementById('tplConfig').value.trim());
  fd.append('file', file);
  const res = await fetch('/api/templates/upload', {method: 'POST', headers: authHeaders(), body: fd});
  const data = await res.json();
  if (!res.ok) {
    setTplResult(`上传失败：${messageFrom(data)}`);
    return;
  }
  setTplResult(`上传成功：模板ID=${data?.data?.id || '-'}，名称=${data?.data?.template_name || document.getElementById('tplName').value.trim()}`);
  loadTemplates();
}

async function loadTemplates() {
  const params = new URLSearchParams();
  const type = document.getElementById('qType').value.trim();
  const category = document.getElementById('qCategory').value.trim();
  const city = document.getElementById('qCity').value.trim();
  if (type) params.set('report_type', type);
  if (category) params.set('category', category);
  if (city) params.set('city', city);
  const res = await fetch('/api/templates?' + params.toString());
  const data = await res.json();
  if (!res.ok) {
    setTplResult(`查询失败：${messageFrom(data)}`);
    return;
  }
  setTplResult(`已加载 ${data.total || 0} 个模板。`);
  document.getElementById('tplTable').innerHTML = data.items.map(i => `
    <tr>
      <td>${i.id}</td>
      <td>${i.template_name}${i.is_default ? ' [默认]' : ''}</td>
      <td>${i.report_type}</td>
      <td>${i.city || ''}</td>
      <td>${i.protection_level || ''}</td>
      <td>V${i.version_no}</td>
      <td>${i.status}</td>
      <td>
        <a href="/api/templates/${i.id}/download" target="_blank">下载</a>
        <button class="btn-lite" onclick="setDefault(${i.id})">设默认</button>
        <button class="btn-lite" onclick="editTemplate(${i.id})">编辑</button>
        <button class="btn-lite" onclick="newVersion(${i.id})">新版本</button>
        <button class="btn-lite" onclick="testFill(${i.id})">测试填充</button>
        <button class="btn-lite" onclick="showVersions(${i.id})">版本</button>
        <button class="btn-lite" onclick="deleteTemplate(${i.id})">删除</button>
      </td>
    </tr>
  `).join('');
}

async function setDefault(id) {
  const res = await fetch(`/api/templates/${id}/set-default`, {method: 'POST', headers: authHeaders()});
  const data = await res.json();
  setTplResult(res.ok ? (data.message || '默认模板已更新') : `设置失败：${messageFrom(data)}`);
  loadTemplates();
}

async function editTemplate(id) {
  const name = prompt('模板名称(可空跳过)', '');
  const city = prompt('地市(可空)', '');
  const level = prompt('级别(可空)', '');
  const payload = {};
  if (name !== null && name.trim()) payload.template_name = name.trim();
  if (city !== null) payload.city = city.trim();
  if (level !== null) payload.protection_level = level.trim();
  const res = await fetch(`/api/templates/${id}`, {
    method: 'PUT',
    headers: {'Content-Type': 'application/json', ...authHeaders()},
    body: JSON.stringify(payload)
  });
  const data = await res.json();
  setTplResult(res.ok ? (data.message || '模板已更新') : `更新失败：${messageFrom(data)}`);
  loadTemplates();
}

async function newVersion(id) {
  const input = document.createElement('input');
  input.type = 'file';
  input.onchange = async () => {
    if (!input.files || !input.files[0]) return;
    const fd = new FormData();
    fd.append('file', input.files[0]);
    const res = await fetch(`/api/templates/${id}/new-version`, {method: 'POST', headers: authHeaders(), body: fd});
    const data = await res.json();
    setTplResult(res.ok ? (data.message || '新版本上传成功') : `上传失败：${messageFrom(data)}`);
    loadTemplates();
  };
  input.click();
}

async function testFill(id) {
  const systemId = prompt('可选：输入系统ID用于测试填充', '');
  const suffix = systemId ? `?system_id=${encodeURIComponent(systemId)}` : '';
  const res = await fetch(`/api/templates/${id}/test-fill${suffix}`);
  const data = await res.json();
  if (!res.ok) {
    setTplResult(`测试填充失败：${messageFrom(data)}`);
    return;
  }
  const preview = data.preview || {};
  const title = preview['标题'] || preview.title || '无标题';
  const sectionCount = Array.isArray(preview['章节']) ? preview['章节'].length : 0;
  setTplResult(`测试填充成功：标题=${title}，章节数=${sectionCount}。`);
}

async function showVersions(id) {
  const res = await fetch(`/api/templates/${id}/versions`);
  const data = await res.json();
  if (!res.ok) {
    setTplResult(`读取版本失败：${messageFrom(data)}`);
    return;
  }
  if (!data.items || !data.items.length) {
    setTplResult('当前模板暂无历史版本。');
    return;
  }
  const versionText = data.items.map(v => `ID=${v.id} | 动作=${v.action || '-'} | 时间=${v.changed_at || '-'}`).join('\n');
  const versionId = prompt(`版本列表：\n${versionText}\n\n输入要恢复的版本ID（取消则不恢复）`, '');
  if (!versionId) return;
  const rb = await fetch(`/api/templates/${id}/restore/${versionId}`, {method: 'POST', headers: authHeaders()});
  const rbData = await rb.json();
  setTplResult(rb.ok ? (rbData.message || '版本恢复成功') : `恢复失败：${messageFrom(rbData)}`);
  loadTemplates();
}

async function deleteTemplate(id) {
  if (!confirm('确认删除模板？')) return;
  const res = await fetch(`/api/templates/${id}`, {method: 'DELETE', headers: authHeaders()});
  const data = await res.json();
  setTplResult(res.ok ? (data.message || '模板已删除') : `删除失败：${messageFrom(data)}`);
  loadTemplates();
}

loadTemplates();
</script>
{% endblock %}
