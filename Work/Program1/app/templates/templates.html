{% extends "base.html" %}
{% block content %}

<div class="panel" data-role-only="admin">
  <div class="section-intro">
    <div class="section-copy">
      <h2><i class="fas fa-layer-group"></i> 模板上传与导入</h2>
      <p>统一维护模板名称、分类和默认版本，保证报告交付口径稳定一致。</p>
    </div>
    <span class="section-flag">管理员专属</span>
  </div>

  <div class="search-bar search-bar-flat">
    <div>
      <label>模板名称 <span class="field-required">*</span></label>
      <input id="tplName" placeholder="例如：三级备案报告模板" />
    </div>
    <div>
      <label>报告类型</label>
      <select id="tplType">
        <option value="定级备案">定级备案</option>
        <option value="整改报告">整改报告</option>
        <option value="自查记录">自查记录</option>
      </select>
    </div>
    <div>
      <label>分类</label>
      <input id="tplCategory" placeholder="如：标准模板" />
    </div>
    <div>
      <label>地市</label>
      <input id="tplCity" placeholder="可为空" />
    </div>
    <div>
      <label>等保级别</label>
      <input id="tplLevel" placeholder="如：3" />
    </div>
    <div>
      <label>模板文件 <span class="field-required">*</span></label>
      <input id="tplFile" type="file" class="input-file-plain" />
    </div>
    <div class="grid-span-full">
      <label>模板说明</label>
      <textarea id="tplDesc" rows="3" placeholder="用于说明模板适用范围、内容差异和维护人"></textarea>
    </div>
    <div class="grid-span-full">
      <label>配置 JSON</label>
      <textarea id="tplConfig" rows="3" placeholder="可为空，用于保存填充规则"></textarea>
    </div>
    <div class="grid-span-full inline-check-row">
      <label class="inline-check" for="tplDefault">
        <input id="tplDefault" type="checkbox" />
        <span>上传后设为默认模板</span>
      </label>
    </div>
    <div class="grid-span-full action-strip">
      <button class="btn-lite" onclick="importLocalOfficialTemplates()"><i class="fas fa-file-import"></i> 导入本地官方模板</button>
      <button onclick="uploadTemplate()"><i class="fas fa-upload"></i> 上传模板</button>
    </div>
  </div>

  <div class="result table-top-gap" id="tplResult">仅管理员可维护模板。</div>
</div>

<div class="panel" data-role-only="admin">
  <div class="section-intro">
    <div class="section-copy">
      <h2><i class="fas fa-table-list"></i> 模板列表</h2>
      <p>按类型、分类和地区筛选模板，快速切换默认版本并维护历史版本。</p>
    </div>
    <span class="section-flag">版本管理</span>
  </div>

  <div class="search-bar search-bar-flat">
    <div>
      <label>报告类型</label>
      <input id="qType" onkeydown="if(event.key==='Enter')loadTemplates()" />
    </div>
    <div>
      <label>分类</label>
      <input id="qCategory" onkeydown="if(event.key==='Enter')loadTemplates()" />
    </div>
    <div>
      <label>地市</label>
      <input id="qCity" onkeydown="if(event.key==='Enter')loadTemplates()" />
    </div>
    <div class="grid-span-full action-strip">
      <button onclick="loadTemplates()"><i class="fas fa-search"></i> 查询</button>
      <button class="btn-lite" onclick="clearTplSearch()"><i class="fas fa-times"></i> 清空</button>
    </div>
  </div>

  <div class="table-wrapper table-top-gap">
    <table class="table-sticky">
      <thead>
        <tr>
          <th>ID</th>
          <th>名称</th>
          <th>类型</th>
          <th>地市</th>
          <th>级别</th>
          <th>版本</th>
          <th>状态</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="tplTable">
        <tr><td colspan="8" style="text-align:center;color:var(--text-muted);padding:32px;">加载中…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
function authHeaders() {
  const token = localStorage.getItem('auth_token') || '';
  return token ? {'X-Auth-Token': token} : {};
}

function authToken() {
  return localStorage.getItem('auth_token') || '';
}

function esc(v) {
  return String(v ?? '').replace(/[&<>"']/g, ch =>
    ({'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'}[ch] || ch)
  );
}

function messageFrom(data, fallback='操作失败') {
  if (!data) return fallback;
  if (typeof data.detail === 'string') return data.detail;
  if (data.detail) return '请求参数不合法';
  return data.message || fallback;
}

function setTplResult(text) {
  const el = document.getElementById('tplResult');
  el.textContent = text;
  el.style.borderColor = 'var(--primary)';
  setTimeout(() => { el.style.borderColor = ''; }, 1200);
}

function tplStatusBadge(status, isDefault) {
  let badge = '';
  if (isDefault) {
    badge += '<span class="status-badge" style="background:#eff6ff;color:#2563eb;">默认</span> ';
  }
  const map = {
    active: ['status-active', '启用'],
    inactive: ['status-archived', '停用'],
    draft: ['status-pending', '草稿']
  };
  const [cls, label] = map[status] || ['', status];
  badge += `<span class="status-badge ${cls}">${esc(label || status)}</span>`;
  return badge;
}

function clearTplSearch() {
  document.getElementById('qType').value = '';
  document.getElementById('qCategory').value = '';
  document.getElementById('qCity').value = '';
  loadTemplates();
}

async function importLocalOfficialTemplates() {
  setTplResult('正在导入本地官方模板...');
  const res = await fetch(`/api/templates/import-local-official?actor=${encodeURIComponent(currentActorName())}`, {method: 'POST', headers: authHeaders()});
  const data = await res.json();
  if (!res.ok) {
    setTplResult(`导入失败：${messageFrom(data)}`);
    return;
  }
  const count = (data.imported || []).length;
  const missing = (data.missing || []).length ? `；缺失文件：${data.missing.join(', ')}` : '';
  setTplResult(`本地官方模板导入完成：成功 ${count} 个${missing}`);
  loadTemplates();
}

async function uploadTemplate() {
  const file = document.getElementById('tplFile').files[0];
  if (!file) {
    setTplResult('请选择模板文件后再上传。');
    return;
  }
  const name = document.getElementById('tplName').value.trim();
  if (!name) {
    setTplResult('模板名称不能为空。');
    return;
  }
  const fd = new FormData();
  fd.append('template_name', name);
  fd.append('report_type', document.getElementById('tplType').value);
  fd.append('category', document.getElementById('tplCategory').value.trim());
  fd.append('city', document.getElementById('tplCity').value.trim());
  fd.append('protection_level', document.getElementById('tplLevel').value.trim());
  fd.append('description', document.getElementById('tplDesc').value.trim());
  fd.append('is_default', document.getElementById('tplDefault').checked ? 'true' : 'false');
  fd.append('config_json', document.getElementById('tplConfig').value.trim());
  fd.append('file', file);
  setTplResult('正在上传，请稍候...');
  const res = await fetch('/api/templates/upload', {method: 'POST', headers: authHeaders(), body: fd});
  const data = await res.json();
  if (!res.ok) {
    setTplResult(`上传失败：${messageFrom(data)}`);
    return;
  }
  setTplResult(`上传成功：${data.template_name || name}`);
  loadTemplates();
}

async function loadTemplates() {
  const params = new URLSearchParams();
  const qType = document.getElementById('qType').value.trim();
  const qCategory = document.getElementById('qCategory').value.trim();
  const qCity = document.getElementById('qCity').value.trim();
  if (qType) params.append('report_type', qType);
  if (qCategory) params.append('category', qCategory);
  if (qCity) params.append('city', qCity);
  const res = await fetch('/api/templates?' + params.toString(), {headers: authHeaders()});
  const data = await res.json();
  if (!res.ok) {
    setTplResult(`读取模板失败：${messageFrom(data)}`);
    document.getElementById('tplTable').innerHTML = '<tr><td colspan="8" style="text-align:center;color:var(--danger);padding:24px;">加载失败</td></tr>';
    return;
  }
  const items = data.items || [];
  if (!items.length) {
    document.getElementById('tplTable').innerHTML = '<tr><td colspan="8" style="text-align:center;color:var(--text-muted);padding:24px;">暂无模板</td></tr>';
    return;
  }
  document.getElementById('tplTable').innerHTML = items.map(i => `
    <tr>
      <td>${i.id}</td>
      <td style="font-weight:600;">${esc(i.template_name)}</td>
      <td>${esc(i.report_type || '-')}</td>
      <td>${esc(i.city || '-')}</td>
      <td>${esc(i.protection_level || '-')}</td>
      <td>${esc(i.version_no || '-')}</td>
      <td>${tplStatusBadge(i.status, i.is_default)}</td>
      <td>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <button class="btn-lite btn-sm" onclick="setDefault(${i.id})">设默认</button>
          <button class="btn-lite btn-sm" onclick="editTemplate(${i.id})">编辑</button>
          <button class="btn-lite btn-sm" onclick="newVersion(${i.id})">新版本</button>
          <button class="btn-lite btn-sm" onclick="testFill(${i.id})">测试填充</button>
          <button class="btn-lite btn-sm" onclick="showVersions(${i.id})">版本</button>
          <button class="btn-lite btn-sm btn-danger" onclick="deleteTemplate(${i.id})"><i class="fas fa-trash"></i></button>
        </div>
      </td>
    </tr>
  `).join('');
}

async function setDefault(id) {
  const res = await fetch(`/api/templates/${id}/set-default`, {method: 'POST', headers: authHeaders()});
  const data = await res.json();
  if (!res.ok) {
    setTplResult(`设置默认失败：${messageFrom(data)}`);
    return;
  }
  setTplResult('默认模板已更新。');
  loadTemplates();
}

async function editTemplate(id) {
  const name = await window.appDialog.prompt('请输入新的模板名称。', '', {
    title: '编辑模板名称',
    label: '模板名称',
    placeholder: '请输入新的模板名称',
    confirmText: '保存修改'
  });
  if (!name) return;
  const res = await fetch(`/api/templates/${id}`, {
    method: 'PUT',
    headers: {...authHeaders(), 'Content-Type': 'application/json'},
    body: JSON.stringify({template_name: name}),
  });
  const data = await res.json();
  if (!res.ok) {
    setTplResult(`编辑失败：${messageFrom(data)}`);
    return;
  }
  setTplResult('模板信息已更新。');
  loadTemplates();
}

async function newVersion(id) {
  const file = document.getElementById('tplFile').files[0];
  if (!file) {
    setTplResult('请先选择文件，再创建新版本。');
    return;
  }
  const fd = new FormData();
  fd.append('file', file);
  const res = await fetch(`/api/templates/${id}/new-version`, {method: 'POST', headers: authHeaders(), body: fd});
  const data = await res.json();
  if (!res.ok) {
    setTplResult(`创建新版本失败：${messageFrom(data)}`);
    return;
  }
  setTplResult('新版本已创建。');
  loadTemplates();
}

async function testFill(id) {
  const suffix = authToken() ? `?token=${encodeURIComponent(authToken())}` : '';
  const res = await fetch(`/api/templates/${id}/test-fill${suffix}`, {headers: authHeaders()});
  const data = await res.json();
  if (!res.ok) {
    setTplResult(`测试填充失败：${messageFrom(data)}`);
    return;
  }
  setTplResult(`测试填充成功：${data.message || '已生成测试结果'}`);
}

async function showVersions(id) {
  const res = await fetch(`/api/templates/${id}/versions`, {headers: authHeaders()});
  const data = await res.json();
  if (!res.ok) {
    setTplResult(`读取版本失败：${messageFrom(data)}`);
    return;
  }
  const items = data.items || [];
  const pick = await window.appDialog.prompt(`当前模板共有 ${items.length} 个版本。输入要恢复的版本 ID，留空则仅查看。`, '', {
    title: '模板版本',
    label: '版本 ID',
    placeholder: '请输入版本 ID',
    confirmText: '继续'
  });
  if (!pick) {
    setTplResult(items.length ? `共 ${items.length} 个版本，可按提示输入版本ID恢复。` : '暂无历史版本。');
    return;
  }
  const versionId = Number(pick);
  if (!versionId) return;
  const rb = await fetch(`/api/templates/${id}/restore/${versionId}`, {method: 'POST', headers: authHeaders()});
  const restoreData = await rb.json();
  if (!rb.ok) {
    setTplResult(`恢复版本失败：${messageFrom(restoreData)}`);
    return;
  }
  setTplResult('模板版本已恢复。');
  loadTemplates();
}

async function deleteTemplate(id) {
  const confirmed = await window.appDialog.confirm('删除后不可恢复，确认删除该模板吗？', '删除模板', '确认删除');
  if (!confirmed) return;
  const res = await fetch(`/api/templates/${id}`, {method: 'DELETE', headers: authHeaders()});
  const data = await res.json();
  if (!res.ok) {
    setTplResult(`删除失败：${messageFrom(data)}`);
    return;
  }
  setTplResult('模板已删除。');
  loadTemplates();
}

loadTemplates();
</script>
{% endblock %}
