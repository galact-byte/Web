{% extends "base.html" %}
{% block content %}

<!-- 模板上传面板 -->
<div class="panel">
  <h2><i class="fas fa-layer-group"></i> 模板上传</h2>
  <div class="grid grid-3">
    <div><label>模板名称 <span style="color:var(--danger)">*</span></label><input id="tplName" /></div>
    <div>
      <label>报告类型 <span style="color:var(--danger)">*</span></label>
      <select id="tplType">
        <option value="grading_report">定级报告</option>
        <option value="filing_form">备案表</option>
        <option value="expert_review_form">专家评审表</option>
      </select>
    </div>
    <div><label>分类</label><input id="tplCategory" placeholder="如：二级模板/三级模板" /></div>
    <div><label>地市</label><input id="tplCity" placeholder="如：福州" /></div>
    <div><label>适用级别</label><input id="tplLevel" placeholder="如：2/3/4" /></div>
    <div><label>描述</label><input id="tplDesc" /></div>
    <div style="display:flex;align-items:flex-end;gap:8px;">
      <label style="display:flex;align-items:center;gap:6px;cursor:pointer;margin-bottom:0;font-weight:500;">
        <input id="tplDefault" type="checkbox" style="width:auto;padding:0;" />
        设为默认模板
      </label>
    </div>
    <div style="grid-column: span 2;">
      <label>配置JSON（可选）</label>
      <input id="tplConfig" placeholder='{"title":"模板标题","sections":[...]}' />
    </div>
    <div>
      <label>模板文件 <span style="color:var(--danger)">*</span></label>
      <input id="tplFile" type="file" style="padding:6px;" />
    </div>
  </div>
  <br />
  <div style="display:flex;gap:10px;flex-wrap:wrap;">
    <button class="btn-lite" onclick="importLocalOfficialTemplates()"><i class="fas fa-file-import"></i> 导入本地官方模板</button>
    <button onclick="uploadTemplate()"><i class="fas fa-upload"></i> 上传模板</button>
  </div>
  <div class="result" id="tplResult" style="margin-top:12px;">可在此查看操作结果。</div>
</div>

<!-- 模板管理面板 -->
<div class="panel">
  <h2><i class="fas fa-list"></i> 模板管理</h2>
  <div class="search-bar">
    <div>
      <label>类型</label>
      <input id="qType" placeholder="grading_report…" onkeydown="if(event.key==='Enter')loadTemplates()" />
    </div>
    <div>
      <label>分类</label>
      <input id="qCategory" onkeydown="if(event.key==='Enter')loadTemplates()" />
    </div>
    <div>
      <label>地市</label>
      <input id="qCity" onkeydown="if(event.key==='Enter')loadTemplates()" />
    </div>
    <div>
      <label>&nbsp;</label>
      <button onclick="loadTemplates()"><i class="fas fa-search"></i> 查询</button>
    </div>
    <div>
      <label>&nbsp;</label>
      <button class="btn-lite" onclick="clearTplSearch()"><i class="fas fa-times"></i> 清空</button>
    </div>
  </div>

  <div class="table-wrapper">
    <table class="table-sticky">
      <thead>
        <tr>
          <th>ID</th>
          <th>名称</th>
          <th>类型</th>
          <th>地市</th>
          <th>级别</th>
          <th>版本</th>
          <th>状态</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="tplTable">
        <tr><td colspan="8" style="text-align:center;color:var(--text-muted);padding:32px;">加载中…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
function authHeaders() {
  const token = localStorage.getItem('auth_token') || '';
  return token ? {'X-Auth-Token': token} : {};
}

function authToken() {
  return localStorage.getItem('auth_token') || '';
}

function esc(v) {
  return String(v ?? '').replace(/[&<>"']/g, ch =>
    ({'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'}[ch] || ch)
  );
}

function messageFrom(data, fallback='操作失败') {
  if (!data) return fallback;
  if (typeof data.detail === 'string') return data.detail;
  if (data.detail) return '请求参数不合法';
  return data.message || fallback;
}

function setTplResult(text) {
  const el = document.getElementById('tplResult');
  el.textContent = text;
  el.style.borderColor = 'var(--primary)';
  setTimeout(() => { el.style.borderColor = ''; }, 1200);
}

/* 模板状态徽章 */
function tplStatusBadge(status, isDefault) {
  let badge = '';
  if (isDefault) {
    badge += '<span class="status-badge" style="background:#eff6ff;color:#2563eb;">默认</span> ';
  }
  const map = {
    active:    ['status-active', '启用'],
    inactive:  ['status-archived', '停用'],
    draft:     ['status-pending', '草稿']
  };
  const [cls, label] = map[status] || ['', status];
  badge += `<span class="status-badge ${cls}">${esc(label || status)}</span>`;
  return badge;
}

function clearTplSearch() {
  document.getElementById('qType').value = '';
  document.getElementById('qCategory').value = '';
  document.getElementById('qCity').value = '';
  loadTemplates();
}

async function importLocalOfficialTemplates() {
  setTplResult('正在导入本地官方模板...');
  const res = await fetch('/api/templates/import-local-official?actor=admin', {method: 'POST', headers: authHeaders()});
  const data = await res.json();
  if (!res.ok) {
    setTplResult(`导入失败：${messageFrom(data)}`);
    return;
  }
  const count = (data.imported || []).length;
  const missing = (data.missing || []).length ? `；缺失文件：${data.missing.join(', ')}` : '';
  setTplResult(`本地官方模板导入完成：成功 ${count} 个${missing}`);
  loadTemplates();
}

async function uploadTemplate() {
  const file = document.getElementById('tplFile').files[0];
  if (!file) {
    setTplResult('请选择模板文件后再上传。');
    return;
  }
  const name = document.getElementById('tplName').value.trim();
  if (!name) {
    setTplResult('模板名称不能为空。');
    return;
  }
  const fd = new FormData();
  fd.append('template_name', name);
  fd.append('report_type', document.getElementById('tplType').value);
  fd.append('category', document.getElementById('tplCategory').value.trim());
  fd.append('city', document.getElementById('tplCity').value.trim());
  fd.append('protection_level', document.getElementById('tplLevel').value.trim());
  fd.append('description', document.getElementById('tplDesc').value.trim());
  fd.append('is_default', document.getElementById('tplDefault').checked ? 'true' : 'false');
  fd.append('config_json', document.getElementById('tplConfig').value.trim());
  fd.append('file', file);
  setTplResult('正在上传，请稍候...');
  const res = await fetch('/api/templates/upload', {method: 'POST', headers: authHeaders(), body: fd});
  const data = await res.json();
  if (!res.ok) {
    setTplResult(`上传失败：${messageFrom(data)}`);
    return;
  }
  setTplResult(`上传成功：模板ID=${data?.data?.id || '-'}，名称=${data?.data?.template_name || name}`);
  loadTemplates();
}

async function loadTemplates() {
  const params = new URLSearchParams();
  const type = document.getElementById('qType').value.trim();
  const category = document.getElementById('qCategory').value.trim();
  const city = document.getElementById('qCity').value.trim();
  if (type) params.set('report_type', type);
  if (category) params.set('category', category);
  if (city) params.set('city', city);
  const res = await fetch('/api/templates?' + params.toString(), {headers: authHeaders()});
  const data = await res.json();
  if (!res.ok) {
    setTplResult(`查询失败：${messageFrom(data)}`);
    document.getElementById('tplTable').innerHTML = '<tr><td colspan="8" style="text-align:center;color:var(--danger);padding:24px;">加载失败</td></tr>';
    return;
  }
  const items = data.items || [];
  setTplResult(`已加载 ${data.total || items.length} 个模板。`);
  if (!items.length) {
    document.getElementById('tplTable').innerHTML = '<tr><td colspan="8" style="text-align:center;color:var(--text-muted);padding:24px;">暂无模板</td></tr>';
    return;
  }
  document.getElementById('tplTable').innerHTML = items.map(i => `
    <tr>
      <td style="color:var(--text-muted);font-size:0.82rem;">${esc(i.id)}</td>
      <td><strong>${esc(i.template_name)}</strong></td>
      <td style="font-size:0.85rem;">${esc(i.report_type)}</td>
      <td>${esc(i.city || '-')}</td>
      <td>${esc(i.protection_level || '-')}</td>
      <td><span style="font-family:monospace;">V${esc(i.version_no)}</span></td>
      <td>${tplStatusBadge(i.status, i.is_default)}</td>
      <td>
        <div style="display:flex;gap:4px;flex-wrap:wrap;">
          <a class="btn-lite btn-sm" href="/api/templates/${i.id}/download${authToken() ? `?token=${encodeURIComponent(authToken())}` : ''}" target="_blank" style="text-decoration:none;"><i class="fas fa-download"></i></a>
          <button class="btn-lite btn-sm" onclick="setDefault(${i.id})">设默认</button>
          <button class="btn-lite btn-sm" onclick="editTemplate(${i.id})">编辑</button>
          <button class="btn-lite btn-sm" onclick="newVersion(${i.id})">新版本</button>
          <button class="btn-lite btn-sm" onclick="testFill(${i.id})">测试填充</button>
          <button class="btn-lite btn-sm" onclick="showVersions(${i.id})">版本</button>
          <button class="btn-lite btn-sm btn-danger" onclick="deleteTemplate(${i.id})"><i class="fas fa-trash"></i></button>
        </div>
      </td>
    </tr>
  `).join('');
}

async function setDefault(id) {
  const res = await fetch(`/api/templates/${id}/set-default`, {method: 'POST', headers: authHeaders()});
  const data = await res.json();
  setTplResult(res.ok ? (data.message || '默认模板已更新') : `设置失败：${messageFrom(data)}`);
  loadTemplates();
}

async function editTemplate(id) {
  const name = prompt('模板名称（可空跳过）', '');
  const city = prompt('地市（可空）', '');
  const level = prompt('级别（可空）', '');
  const payload = {};
  if (name !== null && name.trim()) payload.template_name = name.trim();
  if (city !== null) payload.city = city.trim();
  if (level !== null) payload.protection_level = level.trim();
  const res = await fetch(`/api/templates/${id}`, {
    method: 'PUT',
    headers: {'Content-Type': 'application/json', ...authHeaders()},
    body: JSON.stringify(payload)
  });
  const data = await res.json();
  setTplResult(res.ok ? (data.message || '模板已更新') : `更新失败：${messageFrom(data)}`);
  loadTemplates();
}

async function newVersion(id) {
  const input = document.createElement('input');
  input.type = 'file';
  input.onchange = async () => {
    if (!input.files || !input.files[0]) return;
    const fd = new FormData();
    fd.append('file', input.files[0]);
    const res = await fetch(`/api/templates/${id}/new-version`, {method: 'POST', headers: authHeaders(), body: fd});
    const data = await res.json();
    setTplResult(res.ok ? (data.message || '新版本上传成功') : `上传失败：${messageFrom(data)}`);
    loadTemplates();
  };
  input.click();
}

async function testFill(id) {
  const systemId = prompt('可选：输入系统ID用于测试填充', '');
  const suffix = systemId ? `?system_id=${encodeURIComponent(systemId)}` : '';
  const res = await fetch(`/api/templates/${id}/test-fill${suffix}`, {headers: authHeaders()});
  const data = await res.json();
  if (!res.ok) {
    setTplResult(`测试填充失败：${messageFrom(data)}`);
    return;
  }
  const preview = data.preview || {};
  const title = preview['标题'] || preview.title || '无标题';
  const sectionCount = Array.isArray(preview['章节']) ? preview['章节'].length : 0;
  setTplResult(`测试填充成功：标题=${title}，章节数=${sectionCount}。`);
}

async function showVersions(id) {
  const res = await fetch(`/api/templates/${id}/versions`, {headers: authHeaders()});
  const data = await res.json();
  if (!res.ok) {
    setTplResult(`读取版本失败：${messageFrom(data)}`);
    return;
  }
  if (!data.items || !data.items.length) {
    setTplResult('当前模板暂无历史版本。');
    return;
  }
  const versionText = data.items.map(v => `ID=${v.id} | 动作=${v.action || '-'} | 时间=${v.changed_at || '-'}`).join('\n');
  const versionId = prompt(`版本列表：\n${versionText}\n\n输入要恢复的版本ID（取消则不恢复）`, '');
  if (!versionId) return;
  const rb = await fetch(`/api/templates/${id}/restore/${versionId}`, {method: 'POST', headers: authHeaders()});
  const rbData = await rb.json();
  setTplResult(rb.ok ? (rbData.message || '版本恢复成功') : `恢复失败：${messageFrom(rbData)}`);
  loadTemplates();
}

async function deleteTemplate(id) {
  if (!confirm('确认删除模板？')) return;
  const res = await fetch(`/api/templates/${id}`, {method: 'DELETE', headers: authHeaders()});
  const data = await res.json();
  setTplResult(res.ok ? (data.message || '模板已删除') : `删除失败：${messageFrom(data)}`);
  loadTemplates();
}

loadTemplates();
</script>
{% endblock %}
