{% extends "base.html" %}
{% block content %}

<div class="panel" data-role-only="admin">
  <div class="section-intro">
    <div class="section-copy">
      <h2><i class="fas fa-database"></i> 数据备份与恢复</h2>
      <p>建议在关键操作前后保留快照；恢复会覆盖当前数据库和上传文件，请谨慎执行。</p>
    </div>
    <span class="section-flag">高风险操作</span>
  </div>

  <div class="search-bar search-bar-flat compact-row-grid">
    <div>
      <label>快速备份</label>
      <button onclick="createBackup()"><i class="fas fa-download"></i> 创建备份并下载</button>
    </div>
    <div>
      <label>恢复文件（.zip）</label>
      <input id="restoreFile" type="file" accept=".zip" class="input-file-plain" />
    </div>
    <div>
      <label>恢复操作</label>
      <button class="btn-lite btn-danger" onclick="restoreBackup()"><i class="fas fa-upload"></i> 上传并恢复</button>
    </div>
  </div>

  <pre class="result table-top-gap" id="backupResult" style="min-height:48px;">仅管理员可执行备份与恢复操作。</pre>
</div>

<div class="panel" data-role-only="admin">
  <div class="section-intro">
    <div class="section-copy">
      <h2><i class="fas fa-archive"></i> 备份文件列表</h2>
      <p>集中查看备份文件体积与时间点，必要时可直接下载留档。</p>
    </div>
    <span class="section-flag">可下载</span>
  </div>

  <div class="panel-actions panel-actions-wide">
    <span class="table-meta">恢复前建议先再做一次最新快照。</span>
    <button class="btn-lite" onclick="loadBackups()"><i class="fas fa-sync-alt"></i> 刷新列表</button>
  </div>

  <div class="table-wrapper">
    <table class="table-sticky">
      <thead>
        <tr>
          <th>文件名</th>
          <th>大小（MB）</th>
          <th>更新时间</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="backupTable">
        <tr><td colspan="4" style="text-align:center;color:var(--text-muted);padding:32px;">加载中…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
function authHeaders() {
  const token = localStorage.getItem('auth_token') || '';
  return token ? {'X-Auth-Token': token} : {};
}

function setResult(text) {
  const el = document.getElementById('backupResult');
  el.textContent = text;
  el.style.borderColor = 'var(--primary)';
  setTimeout(() => { el.style.borderColor = ''; }, 1500);
}

function esc(v) {
  return String(v ?? '').replace(/[&<>"']/g, ch =>
    ({'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'}[ch] || ch)
  );
}

function fmtMb(size) {
  const mb = Number(size || 0) / 1024 / 1024;
  return mb < 0.01 ? '< 0.01' : mb.toFixed(2);
}

async function createBackup() {
  setResult('正在创建备份，请稍候...');
  const res = await fetch('/api/backup/create', {method: 'POST', headers: authHeaders()});
  const data = await res.json();
  if (!res.ok) {
    setResult(`创建失败：${data.detail || data.message || '未知错误'}`);
    return;
  }
  setResult(`备份创建成功：${data.file_name}`);
  loadBackups();
  window.open(data.download_url || `/api/backup/download/${encodeURIComponent(data.file_name)}`, '_blank');
}

async function restoreBackup() {
  const input = document.getElementById('restoreFile');
  const file = input.files && input.files[0];
  if (!file) {
    setResult('请先选择备份压缩包（.zip）。');
    return;
  }
  if (!confirm('恢复将覆盖当前数据库与上传文件，确认继续？')) return;
  if (!confirm('请再次确认：本次恢复不可撤销，是否继续执行？')) return;

  const fd = new FormData();
  fd.append('file', file);
  fd.append('confirm', 'true');
  setResult('正在恢复，请勿关闭页面...');
  const res = await fetch('/api/backup/restore', {method: 'POST', headers: authHeaders(), body: fd});
  const data = await res.json();
  if (!res.ok) {
    setResult(`恢复失败：${data.detail || data.message || '未知错误'}`);
    return;
  }
  setResult(`恢复成功。系统已自动生成恢复前快照：${data.pre_restore_backup || '-'}`);
  loadBackups();
}

async function loadBackups() {
  const res = await fetch('/api/backup/list', {headers: authHeaders()});
  const data = await res.json();
  if (!res.ok) {
    setResult(`读取备份列表失败：${data.detail || data.message || '未知错误'}`);
    document.getElementById('backupTable').innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--danger);padding:24px;">加载失败</td></tr>';
    return;
  }
  const items = data.items || [];
  if (!items.length) {
    document.getElementById('backupTable').innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--text-muted);padding:24px;">暂无备份文件</td></tr>';
    setResult(`共 0 个备份文件。`);
    return;
  }
  document.getElementById('backupTable').innerHTML = items.map(item => `
    <tr>
      <td style="font-family:monospace;font-size:0.85rem;">${esc(item.file_name)}</td>
      <td style="text-align:right;font-variant-numeric:tabular-nums;">${fmtMb(item.file_size)}</td>
      <td style="font-size:0.85rem;color:var(--text-muted);">${esc(item.updated_at || '-')}</td>
      <td>
        <button class="btn-lite btn-sm" onclick="window.open('/api/backup/download/${encodeURIComponent(item.file_name)}', '_blank')">
          <i class="fas fa-download"></i> 下载
        </button>
      </td>
    </tr>
  `).join('');
  setResult(`共 ${data.total || items.length} 个备份文件。`);
}

loadBackups();
</script>
{% endblock %}
