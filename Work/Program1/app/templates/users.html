{% extends "base.html" %}
{% block content %}

<div class="panel" data-role-only="admin">
  <div class="section-intro">
    <div class="section-copy">
      <h2><i class="fas fa-users-cog"></i> 用户管理</h2>
      <p>集中维护账号、角色和初始安全策略，避免分散创建造成口径不一致。</p>
    </div>
    <span class="section-flag">管理员专属</span>
  </div>

  <div class="search-bar search-bar-flat">
    <div>
      <label>用户名 <span class="field-required">*</span></label>
      <input id="newUsername" placeholder="登录用户名" />
    </div>
    <div>
      <label>初始密码 <span class="field-required">*</span></label>
      <input id="newPassword" type="password" placeholder="至少 8 位" />
    </div>
    <div>
      <label>角色</label>
      <select id="newRole">
        <option value="evaluator">evaluator（测评师）</option>
        <option value="reviewer">reviewer（审核员）</option>
        <option value="admin">admin（管理员）</option>
      </select>
    </div>
    <div class="grid-span-full inline-check-row">
      <label class="inline-check" for="newRequireChange">
        <input id="newRequireChange" type="checkbox" checked />
        <span>首次登录要求修改密码</span>
      </label>
    </div>
    <div class="grid-span-full action-strip">
      <button onclick="createUser()"><i class="fas fa-user-plus"></i> 新增用户</button>
    </div>
  </div>

  <div class="result table-top-gap" id="userResult">仅管理员可访问该页面。</div>
</div>

<div class="panel" data-role-only="admin">
  <div class="section-intro">
    <div class="section-copy">
      <h2><i class="fas fa-list-check"></i> 用户列表</h2>
      <p>查看账号状态、首次改密要求和最后登录时间，便于统一维护。</p>
    </div>
    <span class="section-flag" id="userCountHint">-</span>
  </div>

  <div class="panel-actions panel-actions-wide">
    <span class="table-meta">支持启停账号与重置密码。</span>
    <button class="btn-lite btn-sm" onclick="loadUsers()"><i class="fas fa-sync-alt"></i> 刷新列表</button>
  </div>

  <div class="table-wrapper">
    <table class="table-sticky">
      <thead>
        <tr>
          <th>ID</th>
          <th>用户名</th>
          <th>角色</th>
          <th>启用状态</th>
          <th>首次改密</th>
          <th>最近登录</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="userTable">
        <tr><td colspan="7" style="text-align:center;color:var(--text-muted);padding:32px;">加载中…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
function authHeaders() {
  const token = localStorage.getItem('auth_token') || '';
  return token ? {'X-Auth-Token': token} : {};
}

function resultText(data, fallback='操作失败') {
  if (!data) return fallback;
  if (typeof data.detail === 'string') return data.detail;
  return data.message || fallback;
}

function setUserResult(text) {
  const el = document.getElementById('userResult');
  el.textContent = text;
  el.style.borderColor = 'var(--primary)';
  setTimeout(() => { el.style.borderColor = ''; }, 1200);
}

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch =>
    ({'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'}[ch] || ch)
  );
}

function encodeUserArg(value) {
  return encodeURIComponent(String(value ?? '')).replace(/'/g, '%27');
}

function roleBadge(role) {
  const map = {
    admin: ['#dc2626', '管理员'],
    reviewer: ['#0891b2', '审核员'],
    evaluator: ['#16a34a', '测评师']
  };
  const [color, label] = map[role] || ['#64748b', role];
  return `<span style="display:inline-block;padding:2px 10px;border-radius:99px;font-size:0.78rem;font-weight:600;background:${color}18;color:${color};">${escapeHtml(label)}</span>`;
}

function enabledBadge(enabled) {
  return enabled
    ? '<span class="status-badge status-active">启用</span>'
    : '<span class="status-badge status-archived">停用</span>';
}

async function loadUsers() {
  const res = await fetch('/api/auth/users', {headers: authHeaders()});
  const data = await res.json();
  if (!res.ok) {
    setUserResult(`读取用户失败：${resultText(data, '仅管理员可查看用户列表')}`);
    document.getElementById('userTable').innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--danger);padding:24px;">无权限或加载失败</td></tr>';
    return;
  }
  const items = data.items || [];
  const hint = document.getElementById('userCountHint');
  if (hint) hint.textContent = `共 ${data.total || items.length} 位用户`;

  if (!items.length) {
    document.getElementById('userTable').innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--text-muted);padding:24px;">暂无用户</td></tr>';
    return;
  }

  document.getElementById('userTable').innerHTML = items.map(u => {
    const lastLogin = u.last_login_at ? escapeHtml(u.last_login_at.replace('T', ' ').slice(0, 19)) : '<span style="color:var(--text-muted)">未登录</span>';
    const mustChange = u.must_change_password
      ? '<span class="status-badge status-pending">是</span>'
      : '<span class="status-badge">否</span>';
    const encodedUsername = encodeUserArg(u.username);
    return `
      <tr>
        <td>${u.id}</td>
        <td style="font-weight:600;">${escapeHtml(u.username)}</td>
        <td>${roleBadge(u.role)}</td>
        <td>${enabledBadge(u.enabled)}</td>
        <td>${mustChange}</td>
        <td style="font-size:0.85rem;">${lastLogin}</td>
        <td>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <button class="btn-lite btn-sm" onclick="toggleUser(${u.id}, ${!u.enabled})">
              <i class="fas ${u.enabled ? 'fa-user-slash' : 'fa-user-check'}"></i> ${u.enabled ? '停用' : '启用'}
            </button>
            <button class="btn-lite btn-sm" onclick="resetPassword(${u.id}, '${encodedUsername}')">
              <i class="fas fa-key"></i> 重置密码
            </button>
          </div>
        </td>
      </tr>
    `;
  }).join('');
}

async function createUser() {
  const username = document.getElementById('newUsername').value.trim();
  const password = document.getElementById('newPassword').value;
  const role = document.getElementById('newRole').value;
  const mustChange = document.getElementById('newRequireChange').checked;

  if (!username || !password) {
    setUserResult('用户名和初始密码不能为空');
    return;
  }

  const res = await fetch('/api/auth/users', {
    method: 'POST',
    headers: {...authHeaders(), 'Content-Type': 'application/json'},
    body: JSON.stringify({username, password, role, must_change_password: mustChange}),
  });
  const data = await res.json();
  if (!res.ok) {
    setUserResult(`新增失败：${resultText(data)}`);
    return;
  }

  setUserResult(`用户已创建：${data.username}（角色：${data.role}）`);
  document.getElementById('newUsername').value = '';
  document.getElementById('newPassword').value = '';
  document.getElementById('newRole').value = 'evaluator';
  document.getElementById('newRequireChange').checked = true;
  loadUsers();
}

async function toggleUser(id, enabled) {
  const res = await fetch(`/api/auth/users/${id}/toggle?enabled=${enabled}`, {method: 'POST', headers: authHeaders()});
  const data = await res.json();
  if (!res.ok) {
    setUserResult(`更新状态失败：${resultText(data)}`);
    return;
  }
  setUserResult(`账号状态已更新：${data.username || id}`);
  loadUsers();
}

async function resetPassword(id, username) {
  const ok = confirm(`确认重置用户 ${decodeURIComponent(username)} 的密码？`);
  if (!ok) return;
  const newPassword = prompt('请输入新的临时密码（至少 8 位）');
  if (!newPassword) return;
  const res = await fetch(`/api/auth/users/${id}/reset-password`, {
    method: 'POST',
    headers: {...authHeaders(), 'Content-Type': 'application/json'},
    body: JSON.stringify({new_password: newPassword}),
  });
  const data = await res.json();
  if (!res.ok) {
    setUserResult(`重置失败：${resultText(data)}`);
    return;
  }
  setUserResult(`密码已重置：${data.username || decodeURIComponent(username)}，请通知该用户尽快登录并修改密码。`);
  loadUsers();
}

loadUsers();
</script>
{% endblock %}
