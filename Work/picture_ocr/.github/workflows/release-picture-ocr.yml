name: Build Picture OCR Release

on:
  push:
    tags:
      - 'picture-ocr-v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag, for example picture-ocr-v0.1.0'
        required: true
        default: 'picture-ocr-v0.1.0'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Prepare release variables
        id: vars
        shell: pwsh
        run: |
          $tag = if ('${{ github.event_name }}' -eq 'workflow_dispatch') { '${{ github.event.inputs.release_tag }}' } else { '${{ github.ref_name }}' }
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "web_zip=picture-ocr-$tag-web.zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Package web ZIP
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-web | Out-Null
          Copy-Item -Recurse dist release-web/dist
          Copy-Item README.md release-web/README.md
          if (Test-Path '启动测评证据采集工具.bat') { Copy-Item '启动测评证据采集工具.bat' release-web/ }
          if (Test-Path 'start-server.ps1') { Copy-Item 'start-server.ps1' release-web/ }
          @"
          测评证据采集工具 ${{ steps.vars.outputs.tag }}

          本次更新摘要：
          - 新增加密 `.evidence` 手机采集闭环：电脑导出加密采集包，手机拍照采集后通过 USB 回传，再由电脑合并导入项目。
          - 新增手机 PWA 离线准备：首次安装必须通过 HTTPS 或 localhost，在 iOS、Android、HarmonyOS 浏览器中使用；适用于非公网采集。
          - 重要限制：普通 HTTP、file:// 和 Electron 桌面客户端不能用于手机 PWA 离线准备；照片和密码不会上传到网络。
          - Word 不再导出旧版编辑提示；Word 导出改为按需加载，优化客户端首屏。
          - 保留多项目管理和普通 ZIP 数据包导入/导出。
          "@ | Set-Content -Encoding UTF8 release-web/RELEASE-NOTES.txt
          Compress-Archive -Path release-web/* -DestinationPath "${{ steps.vars.outputs.web_zip }}" -Force

      - name: Build Windows desktop client
        run: npm run desktop:pack
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: 测评证据采集工具 ${{ steps.vars.outputs.tag }}
          body: |
            ## 本次更新/修复摘要

            - 新增加密 `.evidence` 手机采集闭环：电脑导出加密采集包，手机拍照采集后通过 USB 回传，再由电脑合并导入项目。
            - 新增手机 PWA 离线准备，面向 iOS、Android、HarmonyOS 浏览器的非公网采集场景。
            - 支持手机拍照、USB 回传和电脑端合并导入，照片与密码均不会上传到网络。
            - Word 不再导出旧版编辑提示；Word 导出改为按需加载，优化客户端首屏。
            - 保留多项目管理与普通 ZIP 数据包导入/导出，同时继续提供 Web ZIP 和 Windows 桌面客户端。

            ## 手机 PWA 使用限制

            - 手机 PWA 离线准备仅支持 HTTPS 或 localhost 的首次安装。
            - 普通 HTTP、`file://` 和 Electron 桌面客户端不能作为手机 PWA 离线准备环境。
            - 手机采集用于非公网场景；照片和密码不会上传到网络。

            ## 使用方式

            - Web 静态版：下载 `*-web.zip`，解压后双击 `启动测评证据采集工具.bat` 运行。
            - 手机离线采集：使用 HTTPS 或 localhost 打开 Web 版并完成首次安装；拍照后将 `.evidence` 文件通过 USB 回传，在电脑端选择合并导入。
            - Windows 客户端：下载 `desktop-dist` 产出的 exe/portable 附件，双击运行。
          files: |
            ${{ steps.vars.outputs.web_zip }}
            desktop-dist/*
          fail_on_unmatched_files: false
