name: Build Picture OCR Release

on:
  push:
    tags:
      - 'picture-ocr-v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag, for example picture-ocr-v0.1.0'
        required: true
        default: 'picture-ocr-v0.1.0'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Prepare release variables
        id: vars
        shell: pwsh
        run: |
          $tag = if ('${{ github.event_name }}' -eq 'workflow_dispatch') { '${{ github.event.inputs.release_tag }}' } else { '${{ github.ref_name }}' }
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "web_zip=picture-ocr-$tag-web.zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Package web ZIP
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-web | Out-Null
          Copy-Item -Recurse dist release-web/dist
          Copy-Item README.md release-web/README.md
          if (Test-Path '启动测评证据采集工具.bat') { Copy-Item '启动测评证据采集工具.bat' release-web/ }
          if (Test-Path 'start-server.ps1') { Copy-Item 'start-server.ps1' release-web/ }
          @"
          测评证据采集工具 ${{ steps.vars.outputs.tag }}

          本次更新摘要：
          - 优化手机局域网采集入口：使用同一个“拍照 / 选择图片”按钮，由手机系统提供可用的拍照或相册选项。
          - 清理局域网会话弹窗中的重复“关闭”操作；会话启动后可直接使用“停止会话”。
          - 优化项目列表在小屏幕和 Windows 高 DPI 缩放下的布局：重要操作保持可见，其余操作收纳至“更多操作”。
          - 图片仍仅支持 PNG、JPEG、GIF、WebP 和 BMP；HEIC 暂不支持。
          "@ | Set-Content -Encoding UTF8 release-web/RELEASE-NOTES.txt
          Compress-Archive -Path release-web/* -DestinationPath "${{ steps.vars.outputs.web_zip }}" -Force

      - name: Build Windows desktop client
        run: npm run desktop:pack
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: 测评证据采集工具 ${{ steps.vars.outputs.tag }}
          body: |
            ## ✨ 手机采集更顺手

            - 优化“手机局域网采集”的图片入口：保持一个清晰的“拍照 / 选择图片”按钮，不再强制指定后置相机。
            - Android、iPhone 与 HarmonyOS 设备会由各自的浏览器和系统选择器提供可用的拍照或相册选项，减少部分设备只能进入相册的情况。
            - 局域网会话弹窗移除了重复的底部“关闭”按钮；启动会话后仅保留明确的“停止会话”操作。

            ## 🛠️ 项目列表显示优化

            - 优化小屏幕及 Windows 高 DPI 缩放下的项目列表布局，避免操作按钮拥挤、换行混乱。
            - 窄窗口优先展示系统名称、概要信息和“打开”；手机局域网采集、编辑、导入导出与删除等低频操作收纳至“更多操作”。
            - 宽屏继续保留完整快捷操作，便于高频管理。

            ## 🔄 兼容性说明

            - 图片上传继续支持 PNG、JPEG、GIF、WebP 和 BMP，单个文件上限仍为 10MB；HEIC 暂不支持。
            - 拍照/相册选项最终由手机浏览器和系统版本决定。建议在实际使用的 vivo、华为或 iPhone 设备上先完成一次扫码烟测。
            - 手机局域网采集仍是同一可信 Wi-Fi 或个人热点内的临时 HTTP 会话；请勿在公共 Wi-Fi、陌生热点或其他不可信网络中使用。
          files: |
            ${{ steps.vars.outputs.web_zip }}
            desktop-dist/*
          fail_on_unmatched_files: false
