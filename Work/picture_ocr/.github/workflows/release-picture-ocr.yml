name: Build Picture OCR Release

on:
  push:
    tags:
      - 'picture-ocr-v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag, for example picture-ocr-v0.1.0'
        required: true
        default: 'picture-ocr-v0.1.0'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Prepare release variables
        id: vars
        shell: pwsh
        run: |
          $tag = if ('${{ github.event_name }}' -eq 'workflow_dispatch') { '${{ github.event.inputs.release_tag }}' } else { '${{ github.ref_name }}' }
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "web_zip=picture-ocr-$tag-web.zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Package web ZIP
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-web | Out-Null
          Copy-Item -Recurse dist release-web/dist
          Copy-Item README.md release-web/README.md
          if (Test-Path '启动测评证据采集工具.bat') { Copy-Item '启动测评证据采集工具.bat' release-web/ }
          if (Test-Path 'start-server.ps1') { Copy-Item 'start-server.ps1' release-web/ }
          @"
          测评证据采集工具 ${{ steps.vars.outputs.tag }}

          本次更新摘要：
          - Web ZIP 与 Windows 客户端均支持“手机局域网采集”：手机拍照后实时写入当前系统项目，电脑 IndexedDB 确认落盘后手机才显示成功。
          - Web ZIP 启动器升级为受控局域网临时宿主：本机控制 API、32 字节随机 token、资产/检查项白名单、图片文件头与 10MB 校验、内存交付确认与关闭失效。
          - 选择可信 Wi-Fi / 热点 IPv4 后扫码即可采集；仅允许专用可信网络上的 HTTP 临时会话，不适用于公共网络。
          - 普通 ZIP 数据包继续用于备份和迁移；`.evidence` 仅保留历史兼容和紧急恢复。
          "@ | Set-Content -Encoding UTF8 release-web/RELEASE-NOTES.txt
          Compress-Archive -Path release-web/* -DestinationPath "${{ steps.vars.outputs.web_zip }}" -Force

      - name: Build Windows desktop client
        run: npm run desktop:pack
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: 测评证据采集工具 ${{ steps.vars.outputs.tag }}
          body: |
            ## 本次更新/修复摘要

            - Web ZIP 与 Windows 客户端均提供“手机局域网采集”：扫码后手机拍照/选图，图片实时写入当前系统项目。
            - 手机只有在电脑端 IndexedDB 确认落盘后才显示成功；图片不会永久停留在局域网服务内存中。
            - Web ZIP 的 PowerShell 宿主和 Electron 临时服务均使用 32 字节随机 token、资产/检查项白名单、文件头/MIME/10MB 校验及关闭即失效。
            - 普通 ZIP 数据包继续用于备份与迁移；`.evidence` 仅为历史兼容和紧急恢复保留。

            ## 使用方式与安全边界

            - Web 静态版：下载 `*-web.zip`，解压后双击 `启动测评证据采集工具.bat`。不要关闭 PowerShell 窗口。
            - Windows 客户端：下载 `desktop-dist` 产出的 exe/portable 附件，双击运行。
            - 在目标系统点击“手机局域网采集”，选择手机实际可访问的可信 Wi-Fi / 热点 IPv4 后扫码。
            - 这是不加密的同一可信局域网 HTTP 会话；仅在专用网络允许防火墙访问，绝不要在公共 Wi-Fi、陌生热点或不可信网络使用。
          files: |
            ${{ steps.vars.outputs.web_zip }}
            desktop-dist/*
          fail_on_unmatched_files: false
