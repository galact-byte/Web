name: Build Picture OCR Release

on:
  push:
    tags:
      - 'picture-ocr-v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag, for example picture-ocr-v0.1.0'
        required: true
        default: 'picture-ocr-v0.1.0'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Prepare release variables
        id: vars
        shell: pwsh
        run: |
          $tag = if ('${{ github.event_name }}' -eq 'workflow_dispatch') { '${{ github.event.inputs.release_tag }}' } else { '${{ github.ref_name }}' }
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "web_zip=picture-ocr-$tag-web.zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Package web ZIP
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-web | Out-Null
          Copy-Item -Recurse dist release-web/dist
          Copy-Item README.md release-web/README.md
          if (Test-Path '启动测评证据采集工具.bat') { Copy-Item '启动测评证据采集工具.bat' release-web/ }
          if (Test-Path 'start-server.ps1') { Copy-Item 'start-server.ps1' release-web/ }
          @"
          测评证据采集工具 ${{ steps.vars.outputs.tag }}

          本次更新摘要：
          - 新增检查项“调整顺序”模式：从专用六点手柄拖动时，悬浮副本跟随指针，其余检查项实时平滑让位。
          - 拖至检查项列表顶部或底部边缘会自动滚动；鼠标和触屏均支持，松手后才保存顺序，取消拖动会还原。
          - 手动新增检查项默认设为必填并置顶；现有检查项可直接切换必填/选填。
          - 排序模式隔离上传、粘贴、重命名和删除等普通操作，避免触屏误触；移除了无功能的更多操作图标。
          "@ | Set-Content -Encoding UTF8 release-web/RELEASE-NOTES.txt
          Compress-Archive -Path release-web/* -DestinationPath "${{ steps.vars.outputs.web_zip }}" -Force

      - name: Build Windows desktop client
        run: npm run desktop:pack
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: 测评证据采集工具 ${{ steps.vars.outputs.tag }}
          body: |
            ## ✨ 检查项排序体验

            - 新增独立的“调整顺序”模式：仅从右侧六点手柄拖动，避免与上传、图片排序、重命名和粘贴操作冲突。
            - 拖动时检查项以悬浮副本跟随指针，其他项实时平滑让位；松手后才保存最终顺序，取消触摸或拖动会还原。
            - 拖至列表顶部或底部边缘会自动滚动，支持鼠标和触屏连续调整长列表。

            ## 🛠️ 检查项操作优化

            - 手动新增检查项现在默认设为必填，并插入当前资产检查项列表首位。
            - 保留单击“必填 / 选填”切换状态的操作；移除了没有功能的更多操作图标。
            - 排序模式会临时隐藏上传、粘贴目标、状态切换、重命名和删除，完成排序后恢复原有操作。

            ## 🔄 兼容性说明

            - 现有项目、检查项和图片数据格式保持兼容，无需迁移。
            - Web 静态版 ZIP 与 Windows Electron 客户端使用同一套排序实现；刷新 Web 页面或升级客户端后即可使用。
            - 图片上传继续支持 PNG、JPEG、GIF、WebP 和 BMP，单个文件上限仍为 10MB；HEIC 暂不支持。
          files: |
            ${{ steps.vars.outputs.web_zip }}
            desktop-dist/*
          fail_on_unmatched_files: false
