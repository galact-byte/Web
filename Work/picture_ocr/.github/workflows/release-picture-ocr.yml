name: Build Picture OCR Release

on:
  push:
    tags:
      - 'picture-ocr-v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag, for example picture-ocr-v0.1.0'
        required: true
        default: 'picture-ocr-v0.1.0'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Prepare release variables
        id: vars
        shell: pwsh
        run: |
          $tag = if ('${{ github.event_name }}' -eq 'workflow_dispatch') { '${{ github.event.inputs.release_tag }}' } else { '${{ github.ref_name }}' }
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "web_zip=picture-ocr-$tag-web.zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Package web ZIP
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-web | Out-Null
          Copy-Item -Recurse dist release-web/dist
          Copy-Item README.md release-web/README.md
          if (Test-Path '启动测评证据采集工具.bat') { Copy-Item '启动测评证据采集工具.bat' release-web/ }
          if (Test-Path 'start-server.ps1') { Copy-Item 'start-server.ps1' release-web/ }
          @"
          测评证据采集工具 ${{ steps.vars.outputs.tag }}

          本次更新摘要：
          - 修复“制度”等预设资产删除或重命名后被自动补回、并残留空副本的问题。
          - 修复合并导入证据包时，同名且同一时刻的多张不同截图被误判为重复而丢失的问题。
          - 修复报告日期缺失或非法时，Word 封面出现“NaN年NaN月”的问题。
          - 侧边栏与项目列表改为更克制的深色/浅色企业风配色，保留原有品牌标识。
          - 手机局域网采集弹窗排版优化：连接链接可整段选中、连接地址下拉更清晰、二维码区说明填满并新增扫码提示。
          "@ | Set-Content -Encoding UTF8 release-web/RELEASE-NOTES.txt
          Compress-Archive -Path release-web/* -DestinationPath "${{ steps.vars.outputs.web_zip }}" -Force

      - name: Build Windows desktop client
        run: npm run desktop:pack
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: 测评证据采集工具 ${{ steps.vars.outputs.tag }}
          body: |
            ## 🛠️ 修复与优化

            - 修复“制度”等预设资产的顽固回归问题：此前删除或重命名后会在保存/加载时被强制补回，并残留一个空副本；现在预设资产可以正常删除、重命名，不再自动补齐。
            - 修复合并导入证据包时的误去重：同名且上传时刻相同（同一毫秒批量粘贴）的多张不同截图，此前会被当作重复丢弃；现在会额外比对数据长度，确保内容不同的截图都保留。
            - 修复 Word 封面日期异常：当报告日期缺失或格式非法时，封面不再出现“NaN年NaN月”，改为留空。

            ## 🎨 界面调整

            - 侧边栏改为更克制的深色企业风：统一蓝色强调、选中项左侧蓝条标识，去除多余的霓虹光影与背景点阵；保留青色描边的 “Evidence Pro” 品牌标识。
            - 项目列表页去除装饰性点阵背景与中文标题的全大写字距处理，品牌与搜索文案回归常规排版。
            - 手机局域网采集弹窗排版优化：连接链接改为等宽、可整段选中的文本块；“电脑连接地址”下拉框重绘为自定义样式并按内容自适应宽度；二维码区域说明填满高度并新增“手机扫码打开采集页”提示；“手机局域网采集”按钮与其余顶栏按钮对齐等高。

            ## 🔄 兼容性说明

            - 现有项目、检查项、资产与图片数据格式保持兼容，无需迁移；升级后旧证据包可正常打开。
            - 以上修复对导出证据包与合并导入均生效；若此前导入时丢过同名截图，重新导入即可补回。
            - Web 静态版 ZIP 与 Windows Electron 客户端为同一套实现，刷新 Web 页面或升级客户端后生效。
          files: |
            ${{ steps.vars.outputs.web_zip }}
            desktop-dist/*
          fail_on_unmatched_files: false
