name: Build Picture OCR Release

on:
  push:
    tags:
      - 'picture-ocr-v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag, for example: picture-ocr-v0.1.0'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: picture-ocr-release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  APP_DIR: Work/picture_ocr
  NODE_VERSION: '22'

jobs:
  build-and-release:
    name: Build and publish release asset
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # 手动重发既有标签时，从默认分支读取工作流与人工发布说明；
          # 普通标签推送仍严格构建该标签指向的源码。
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.repository.default_branch || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.APP_DIR }}/package-lock.json

      - name: Sync app version from release tag
        working-directory: ${{ env.APP_DIR }}
        shell: bash
        env:
          RELEASE_TAG_INPUT: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          if [ -n "${RELEASE_TAG_INPUT:-}" ]; then
            TAG="$RELEASE_TAG_INPUT"
          else
            TAG="$GITHUB_REF_NAME"
          fi
          VERSION="$(printf '%s' "$TAG" | sed 's/^picture-ocr-v//')"
          echo "Syncing version to: $VERSION"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Install dependencies
        working-directory: ${{ env.APP_DIR }}
        run: npm ci

      - name: Build static site
        working-directory: ${{ env.APP_DIR }}
        run: npm run build

      - name: Build Windows desktop client
        working-directory: ${{ env.APP_DIR }}
        shell: bash
        run: npm run desktop:clean && npx electron-builder --win --publish never

      - name: Package release zip
        id: package
        working-directory: ${{ env.APP_DIR }}
        shell: bash
        env:
          RELEASE_TAG_INPUT: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail

          if [ -n "${RELEASE_TAG_INPUT:-}" ]; then
            RELEASE_TAG="$RELEASE_TAG_INPUT"
          else
            RELEASE_TAG="$GITHUB_REF_NAME"
          fi

          SAFE_TAG="$(printf '%s' "$RELEASE_TAG" | sed 's/[^A-Za-z0-9._-]/-/g')"
          if [[ "$SAFE_TAG" == picture-ocr-* ]]; then
            PACKAGE_NAME="$SAFE_TAG"
          else
            PACKAGE_NAME="picture-ocr-${SAFE_TAG}"
          fi
          ZIP_NAME="${PACKAGE_NAME}.zip"
          export PACKAGE_NAME ZIP_NAME

          rm -rf release "$ZIP_NAME"
          mkdir -p "release/${PACKAGE_NAME}"

          cp -R dist "release/${PACKAGE_NAME}/dist"
          cp README.md "release/${PACKAGE_NAME}/README.md"
          cp RELEASE-NOTES.md "release/${PACKAGE_NAME}/RELEASE-NOTES.md"
          cp start-server.ps1 "release/${PACKAGE_NAME}/start-server.ps1"
          cp '启动测评证据采集工具.bat' "release/${PACKAGE_NAME}/启动测评证据采集工具.bat"
          printf '%s\n' "$RELEASE_TAG" > "release/${PACKAGE_NAME}/VERSION.txt"

          python - <<'PY'
          import os
          import zipfile
          from pathlib import Path

          package_name = os.environ['PACKAGE_NAME']
          zip_name = os.environ['ZIP_NAME']
          package_dir = Path('release') / package_name

          with zipfile.ZipFile(zip_name, 'w', compression=zipfile.ZIP_DEFLATED) as archive:
              for path in package_dir.rglob('*'):
                  if path.is_file():
                      archive.write(path, path.relative_to('release'))
          PY

          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "zip_path=${APP_DIR}/${ZIP_NAME}" >> "$GITHUB_OUTPUT"
          echo "zip_name=${ZIP_NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: picture-ocr-release-assets
          path: |
            ${{ steps.package.outputs.zip_path }}
            ${{ env.APP_DIR }}/desktop-dist/*
          if-no-files-found: error

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.package.outputs.release_tag }}
          ZIP_PATH: ${{ steps.package.outputs.zip_path }}
          DESKTOP_DIST: ${{ env.APP_DIR }}/desktop-dist
        shell: bash
        run: |
          set -euo pipefail

          NOTES_FILE="${APP_DIR}/RELEASE-NOTES.md"
          RELEASE_VERSION="${RELEASE_TAG#picture-ocr-v}"
          RELEASE_TITLE="测评证据采集工具 v${RELEASE_VERSION}"
          TARGET_COMMIT="$(git rev-list -n 1 "$RELEASE_TAG")"

          if [ ! -s "$NOTES_FILE" ]; then
            echo "缺少人工发布说明：$NOTES_FILE。每次发布必须提供面向用户的 RELEASE-NOTES.md，不能使用提交标题或通用模板代替。" >&2
            exit 1
          fi

          release_files=("$ZIP_PATH")
          while IFS= read -r -d '' file; do
            release_files+=("$file")
          done < <(find "$DESKTOP_DIST" -maxdepth 1 -type f -print0)

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --title "$RELEASE_TITLE" --notes-file "$NOTES_FILE"
            gh release upload "$RELEASE_TAG" "${release_files[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" "${release_files[@]}" \
              --target "$TARGET_COMMIT" \
              --title "$RELEASE_TITLE" \
              --notes-file "$NOTES_FILE"
          fi
